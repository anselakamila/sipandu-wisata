<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPANDU Wisata</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav>
    <h2>SIPANDU-WISATA</h2>

    <ul>
        <li>Beranda</li>
        <li>Tentang</li>
        <li>Destinasi</li>
        <li class="login-btn">Login</li>
    </ul>
</nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="overlay">
            <h1>Temukan Petualanganmu</h1>
            <p>Temukan destinasi wisata terbaik di Indonesia</p>
        </div>
    </section>

    <!-- Destinasi -->
    <section class="destinasi">
    <h2>Destinasi Populer</h2>

    <div class="card-container">

        <div class="card">
            <img src="images/bali.jpg" alt="Bali">
            <h3>Bali</h3>
        </div>

        <div class="card">
            <img src="images/jogja.jpg" alt="Jogja">
            <h3>Jogja</h3>
        </div>

        <div class="card">
            <img src="images/rajaampat.jpg" alt="Raja Ampat">
            <h3>Raja Ampat</h3>
        </div>

    </div>
</section>

    <!-- Footer -->
    <footer>
    <p>© 2026 SIPANDU-WISATA | Website Rekomendasi Wisata Indonesia</p>
</footer>

</html>
